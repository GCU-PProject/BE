name: Java CD (Deploy to GCP)

on:
  workflow_run:
    workflows: ["Java CI with Gradle (PR & Push)"]
    types: [completed]
    branches: [ "dev" ]

jobs:
  deploy:
    if: |
      github.event.workflow_run.conclusion == 'success' && 
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy to Spring Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SPRING_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22

          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.GCP_VM_USER }}
          proxy_key: ${{ secrets.GCP_SSH_KEY }}
          proxy_port: 22

          script: |
            set -e

            echo '${{ secrets.DOCKER_PASSWORD }}' | sudo docker login -u '${{ secrets.DOCKER_USER_NAME }}' --password-stdin

            cat <<'EOF' > ~/docker-compose.yml
            ${{ secrets.YAML_COMPOSE }}
            EOF

            sudo docker-compose -f ~/docker-compose.yml pull
            sudo docker-compose -f ~/docker-compose.yml up -d
            sudo docker image prune -f
            sudo docker ps