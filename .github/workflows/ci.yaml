name: Java CI with Gradle (PR & Push)

on:
  push:
    branches: [ "dev" ]      # dev 브랜치에 코드가 합쳐졌을 때
  pull_request:
    branches: [ "dev" ]      # dev 브랜치로 PR이 올라왔을 때

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. Gradle 캐싱 (빌드 속도 최적화)
      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 2. GitHub Secrets로 설정 파일 생성 (PR/Push 공통)
      # 빌드가 성공하려면 yml 파일들이 꼭 필요하므로 항상 실행
      - name: Generate Application Configs
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.YAML }}" > ./src/main/resources/application.yaml
          echo "${{ secrets.YAML_DEV }}" > ./src/main/resources/application-dev.yaml
          echo "${{ secrets.YAML_OAUTH }}" > ./src/main/resources/application-oauth.yaml
          echo "${{ secrets.YAML_JWT }}" > ./src/main/resources/application-jwt.yaml
          echo "${{ secrets.YAML_COMPOSE }}" > docker-compose.yaml
        shell: bash

      # 3. Gradle 빌드 및 테스트 (PR/Push 공통)
      # 이 단계가 성공해야 깃허브에서 초록색 체크 표시(Checks passed)가 뜸
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # 아래 단계들은 오직 'push'(머지 포함) 이벤트일 때만 실행

      # 4. 도커 허브 로그인 (Only on Push)
      - name: Docker Hub Login
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Docker 이미지 빌드 및 푸시 (Only on Push)
      - name: Build and Push Docker image
        if: github.event_name == 'push'
        run: |
          DOCKER_IMAGE=${{ secrets.DOCKER_USER_NAME }}/glaw
          # 'latest' 태그와 '커밋 해시' 태그를 동시에 생성하여 추적을 용이하게 함
          docker build -t $DOCKER_IMAGE:latest -t $DOCKER_IMAGE:${{ github.sha }} .
          docker push $DOCKER_IMAGE:latest
          docker push $DOCKER_IMAGE:${{ github.sha }}
